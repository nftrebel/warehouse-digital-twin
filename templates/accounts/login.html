{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Цифровой двойник</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1f36 0%, #252b48 50%, #2d3561 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-card .brand {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-card .brand .icon {
            width: 60px; height: 60px; border-radius: 14px;
            background: linear-gradient(135deg, #6384ff, #4f6af0);
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 1.6rem; color: #fff; margin-bottom: .75rem;
        }
        .login-card .brand h4 {
            font-weight: 700; color: #1a1f36; margin-bottom: .25rem;
        }
        .login-card .brand p {
            font-size: .85rem; color: #7b8094; margin: 0;
        }
        .form-control:focus {
            border-color: #6384ff;
            box-shadow: 0 0 0 3px rgba(99,132,255,.15);
        }
        .btn-login {
            background: linear-gradient(135deg, #6384ff, #4f6af0);
            border: none; color: #fff; font-weight: 600;
            padding: .65rem; border-radius: 10px; width: 100%;
            font-size: .95rem; transition: .2s;
        }
        .btn-login:hover { background: #4f6af0; color: #fff; transform: translateY(-1px); box-shadow: 0 4px 15px rgba(99,132,255,.4); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">
            <div class="icon"><i class="bi bi-box-seam"></i></div>
            <h4>Цифровой двойник</h4>
            <p>Складская логистика</p>
        </div>

        {% if form.errors %}
        <div class="alert alert-danger py-2" style="font-size:.85rem">
            <i class="bi bi-exclamation-circle me-1"></i>Неверный логин или пароль
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label" style="font-size:.85rem;font-weight:500">Логин</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Введите логин" autofocus required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label" style="font-size:.85rem;font-weight:500">Пароль</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Введите пароль" required>
                </div>
            </div>
            <button type="submit" class="btn btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i>Войти в систему
            </button>
        </form>
    </div>
</body>
</html>
